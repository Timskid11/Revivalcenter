*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

@keyframes spin { to { transform: rotate(360deg); } }

// ─── UTILS ─────────────────────────────────────────────────────────────────
function formatDate(d){
  try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  catch{return d;}
}

function getNextEventDate(targetDayOfWeek, serviceHourOfDay) {
  const now = new Date();
  const currentDay = now.getDay();
  let daysUntil = (targetDayOfWeek - currentDay + 7) % 7;
  if (daysUntil === 0 && now.getHours() >= serviceHourOfDay) daysUntil = 7;
  const nextDate = new Date(now);
  nextDate.setDate(now.getDate() + daysUntil);
  return nextDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getNextFirstFriday(serviceHourOfDay = 22) {
  const now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();
  function getFirstFriday(y, m) {
    const d = new Date(y, m, 1);
    const day = d.getDay();
    const offset = (5 - day + 7) % 7;
    d.setDate(1 + offset);
    return d;
  }
  let ff = getFirstFriday(year, month);
  if (now.getDate() > ff.getDate() || (now.getDate() === ff.getDate() && now.getHours() >= serviceHourOfDay)) {
    if (month === 11) { month = 0; year++; } else { month++; }
    ff = getFirstFriday(year, month);
  }
  return ff.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─── LATEST SERMONS STRIP ─────────────────────────────────────────────────
function LatestSermonsStrip({setPage}){
  const [videos,setVideos]=useState(FALLBACK_VIDEOS.slice(0,4));
  useEffect(()=>{
    const timestamp = new Date().getTime();
    const rssUrl=`https://www.youtube.com/feeds/videos.xml?channel_id=${YOUTUBE_CHANNEL_ID}&_=${timestamp}`;
    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=10`)
      .then(r=>r.json())
      .then(data=>{
        if(data.status==='ok'&&data.items?.length){
          let mapped=data.items.map(item=>({
            id:item.link.split('v=')[1]?.split('&')[0]||'', title:item.title, date:item.pubDate, thumb:item.thumbnail,
          })).filter(v=>v.id);
          mapped.sort((a,b) => new Date(b.date) - new Date(a.date));
          if(mapped.length) setVideos(mapped.slice(0,4));
        }
      }).catch(()=>{});
  },[]);

  return(
    <div className="section" style={{ background: 'var(--blue-dark)' }}>
      <div className="container">
        <div style={{textAlign:'center', marginBottom:48}}>
          <h2 style={{fontSize:'clamp(32px,4vw,56px)',fontWeight:900,color:'var(--white)',lineHeight:1.1, textTransform:'uppercase'}}>
            Sermons & Teachings
          </h2>
          <p style={{color:'var(--gray)',marginTop:12,fontSize:16}}>Latest Sermons on the Word, Sanctification, Revival and Bible Study</p>
        </div>
        
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:24}}>
          {videos.map((v,i)=>(
            <a key={v.id} href={`https://youtu.be/${v.id}`} target="_blank" rel="noreferrer" style={{background:'#fff', borderRadius:'12px', overflow:'hidden', textDecoration:'none', display:'block', border:'2px solid var(--blue-bright)', transition:'transform 0.2s'}}>
              <div style={{aspectRatio:'16/9', background:'#000', position:'relative'}}>
                <img src={v.thumb || `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`} alt={v.title} style={{width:'100%',height:'100%',objectFit:'cover', opacity:0.8}}/>
                <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
                  <div style={{background:'var(--red)', color:'#fff', padding:'8px 24px', borderRadius:'4px', fontWeight:800, fontSize:12, textTransform:'uppercase'}}>Watch Now</div>
                </div>
              </div>
            </a>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── SERMONS PAGE ─────────────────────────
function SermonsPage(){
  const [allVideos,setAllVideos]=useState(FALLBACK_VIDEOS);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    const timestamp = new Date().getTime();
    const rssUrl=`https://www.youtube.com/feeds/videos.xml?channel_id=${YOUTUBE_CHANNEL_ID}&_=${timestamp}`;
    const apiUrl=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=20`;
    fetch(apiUrl)
      .then(r=>r.json())
      .then(data=>{
        if(data.status==='ok'&&data.items?.length){
          let mapped=data.items.map(item=>({
            id:item.link.split('v=')[1]?.split('&')[0]||'', title:item.title, date:item.pubDate, category:item.categories?.[0]||'Sermon', thumb:item.thumbnail,
          })).filter(v=>v.id);
          mapped.sort((a,b) => new Date(b.date) - new Date(a.date));
          if(mapped.length) setAllVideos(mapped);
        }
      })
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[]);

  return(
    <section style={{ paddingTop: '160px', paddingBottom: '120px', background: 'var(--white)' }} className="container">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', borderBottom: '1px solid var(--border)', paddingBottom: '40px', marginBottom: '60px', flexWrap: 'wrap', gap: '20px' }}>
        <div>
          <div style={{ fontSize: '12px', fontWeight: '800', letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--magenta)', marginBottom: '8px' }}>Sermons & Teachings</div>
          <h1 className="serif" style={{ fontSize: 'clamp(40px, 6vw, 72px)', lineHeight: '1.1', margin: 0, color:'var(--blue-royal)' }}>The Message</h1>
        </div>
        <span className="tag tag-magenta">Auto-Updating Feed</span>
      </div>

      {loading ? (
        <h2 style={{ fontSize: '24px', textAlign: 'center', padding: '100px', color: 'var(--gray)' }}>Loading videos...</h2>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: '40px' }}>
          {allVideos.slice(0, 9).map((vid, i) => {
            const id = vid.guid ? vid.guid.split(':')[2] : vid.id;
            const date = new Date(vid.pubDate || vid.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            return (
              <div key={i} style={{ display: 'flex', flexDirection: 'column' }}>
                <div style={{ aspectRatio: '16/9', background: 'var(--dark)', marginBottom: '16px', borderRadius:'12px', overflow:'hidden', border:'1px solid var(--border)' }}>
                  <iframe src={`https://www.youtube.com/embed/${id}`} style={{ width: '100%', height: '100%', border: 'none' }} allowFullScreen></iframe>
                </div>
                <div style={{ fontSize: '11px', color: 'var(--magenta)', fontWeight: '800', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '8px' }}>{date}</div>
                <h3 className="serif" style={{ fontSize: '20px', lineHeight: '1.3', fontWeight:800, color:'var(--text-dark)' }}>{vid.title}</h3>
              </div>
            );
          })}
        </div>
      )}
    </section>
  );
}

// ─── CONTACT PAGE ──────────────────────────────────────────────────────────
function ContactPage(){
  const [form,setForm]=useState({name:'',email:'',phone:'',message:''});
  const [errors,setErrors]=useState({});
  const [status,setStatus]=useState('idle');
  
  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name='Name is required';
    if(!form.email.trim()||!/\S+@\S+\.\S+/.test(form.email)) e.email='Valid email required';
    if(!form.message.trim()) e.message='Message is required';
    return e;
  };

  const submit = async ev => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({}); setStatus('loading');
    try {
      const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(form) });
      if (response.ok) { setStatus('success'); setForm({name:'',email:'',phone:'',message:''}); } 
      else { setStatus('idle'); alert("Error sending message."); }
    } catch (err) { setStatus('idle'); alert("Network error."); }
  };

  const fieldStyle=(key)=>({background:'#fff',border:`1px solid ${errors[key]?'#DC2626':'var(--border)'}`,borderRadius:8,padding:'16px',color:'var(--text-dark)',fontSize:14,outline:'none',width:'100%',fontFamily:'inherit',transition:'border-color .2s'});
  
  return(
    <section style={{ paddingTop: '160px', paddingBottom: '120px' }} className="container">
      <div style={{textAlign:'center', marginBottom:80}}>
        <h1 className="serif" style={{ fontSize: 'clamp(40px, 6vw, 64px)', lineHeight: '1.1', margin: '0 0 16px 0', color:'var(--blue-royal)' }}>Contact Us</h1>
        <p style={{ fontSize: '18px', color: 'var(--gray)', fontWeight: 500 }}>Reach out any time — by phone, email, or prayer request.</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:64}}>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {[
            {icon:'📍',label:'Address',value:ADDRESS,href:MAPS_URL},
            {icon:'📞',label:'Phone',value:PHONE,href:`tel:${PHONE}`},
            {icon:'✉',label:'Email',value:EMAIL,href:`mailto:${EMAIL}`},
            {icon:'💻',label:'Online gatherings',value:`Wed & Thu · 7:00 PM CST · Zoom ${ZOOM_ID} · Pass: ${ZOOM_PASS}`},
          ].map(c=>(
            <div key={c.label} className="card" style={{padding:'24px',display:'flex',gap:16,alignItems:'flex-start'}}>
              <span style={{fontSize:24}}>{c.icon}</span>
              <div>
                <div style={{fontSize:11,fontWeight:800,letterSpacing:'0.15em',color:'var(--magenta)',textTransform:'uppercase',marginBottom:4}}>{c.label}</div>
                {c.href?( <a href={c.href} target="_blank" rel="noreferrer" style={{fontSize:14,color:'var(--blue-royal)',fontWeight:700}}>{c.value}</a> )
                :( <p style={{fontSize:14,color:'var(--gray)',fontWeight:500}}>{c.value}</p> )}
              </div>
            </div>
          ))}
        </div>

        <div style={{background:'var(--off-white)',padding:40,borderRadius:16}}>
          <h3 className="serif" style={{fontSize:36, marginBottom:8, color:'var(--blue)'}}>Send a message</h3>
          <p style={{color:'var(--gray)', marginBottom:24, fontSize:14}}>Share a prayer request or ask us anything.</p>
          {status==='success'?(
            <div style={{textAlign:'center',padding:'40px 0'}}>
              <div style={{fontSize:48,marginBottom:16}}>✦</div>
              <div style={{fontSize:24,color:'var(--magenta)',marginBottom:10,fontWeight:800}}>Thank you.</div>
              <p style={{color:'var(--gray)'}}>Your message has been received.</p>
              <button onClick={()=>setStatus('idle')} className="btn-blue-small" style={{marginTop:24}}>Send Another</button>
            </div>
          ):(
            <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
              <input type="text" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} style={fieldStyle('name')} placeholder="Full Name"/>
              <input type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} style={fieldStyle('email')} placeholder="Email Address"/>
              <textarea rows={5} value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} style={{...fieldStyle('message'),resize:'vertical'}} placeholder="Your message..."/>
              <button type="submit" className="btn-magenta" disabled={status==='loading'} style={{opacity:status==='loading'?.7:1,justifyContent:'center'}}>
                {status==='loading'?'Sending…':'Submit Request'}
              </button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}
