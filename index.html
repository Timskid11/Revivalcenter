function formatDate(d){
  try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  catch{return d;}
}

function getNextEventDate(targetDayOfWeek, serviceHourOfDay) {
  const now = new Date();
  let daysUntil = (targetDayOfWeek - now.getDay() + 7) % 7;
  if (daysUntil === 0 && now.getHours() >= serviceHourOfDay) daysUntil = 7;
  const nextDate = new Date(now);
  nextDate.setDate(now.getDate() + daysUntil);
  return nextDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getNextFirstFriday(serviceHourOfDay = 22) {
  const now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();
  const getFF = (y, m) => {
    const d = new Date(y, m, 1);
    d.setDate(1 + ((5 - d.getDay() + 7) % 7));
    return d;
  }
  let ff = getFF(year, month);
  if (now.getDate() > ff.getDate() || (now.getDate() === ff.getDate() && now.getHours() >= serviceHourOfDay)) {
    ff = getFF(month === 11 ? year + 1 : year, month === 11 ? 0 : month + 1);
  }
  return ff.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

        <div>

          <p style={{ fontSize: '18px', color: 'rgba(255,255,255,0.9)', marginBottom: '40px', lineHeight: 1.7 }}>351 Market Center Dr, Terrell, TX 75160</p>
          <button className="btn-neon" onClick={() => window.open(MAPS_URL)}>GET DIRECTIONS</button>
        </div>
        <div style={{ background: 'var(--white)', borderRadius: '24px', padding: '32px', color: 'var(--text-dark)' }}>
           <h3 style={{marginBottom:16}}>Service Times</h3>
           <p style={{marginBottom:8}}><strong>Sunday Worship:</strong> 10:00 AM</p>
           <p style={{marginBottom:8}}><strong>Bible Study:</strong> Wed 7:00 PM</p>
        </div>
      </div>
    </section>
  );
}

const App = () => {
  const [page, setPage] = useState('home');
  const render = () => {
    switch(page) {
      case 'about': return <AboutPage setPage={setPage} />;
      case 'pastors': return <PastorsPage />;
      case 'worldwide': return <WorldwidePage />;
      case 'beliefs': return <BeliefsPage />;
      case 'sermons': return <SermonsPage />;
      case 'visit': return <VisitPage setPage={setPage} />;
      case 'give': return <GivePage />;
      case 'socials': return <SocialsPage />;
      case 'contact': return <ContactPage />;
      default: return <HomePage setPage={setPage} />;
    }
  };
  return (
    <Fragment>
      <GlobalEventReminder setPage={setPage} />
      <Navbar page={page} setPage={setPage} />
      <main>{render()}</main>
      <footer style={{background:'var(--blue-dark)', color:'#fff', padding:'80px 40px 40px', textAlign:'center'}}>
        <BrandLogo light={true} />
        <p style={{marginTop:24, opacity:0.6}}>© {new Date().getFullYear()} RCCG Revival Center Texas. All Rights Reserved.</p>
      </footer>
    </Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
